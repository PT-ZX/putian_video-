<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的视频号</title>
<style>
  :root {
    --bg: #0f1115;
    --surface: #181b22;
    --surface-2: #20242d;
    --border: rgba(255,255,255,0.08);
    --text: #e8eaed;
    --text-2: #a8adb8;
    --text-3: #6e7480;
    --accent: #ff3a5c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
  body { min-height: 100vh; }

  header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(15,17,21,0.85); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
  header .meta { color: var(--text-3); font-size: 13px; }
  header input.search {
    margin-left: auto;
    background: var(--surface-2); border: 1px solid var(--border);
    color: var(--text); padding: 7px 12px; border-radius: 8px;
    font-size: 13px; width: 220px;
  }
  header input.search:focus { outline: none; border-color: var(--accent); }

  main { padding: 20px; max-width: 1280px; margin: 0 auto; }
  section.series { margin-bottom: 36px; }
  section.series h2 {
    font-size: 16px; font-weight: 600; margin: 0 0 12px;
    display: flex; align-items: baseline; gap: 8px;
  }
  section.series h2 .count { color: var(--text-3); font-size: 12px; font-weight: 400; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.18); }
  .thumb {
    width: 100%; aspect-ratio: 16/10;
    background: #000;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .thumb canvas { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb .play-icon {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
    opacity: 0.85;
  }
  .thumb .play-icon svg {
    width: 44px; height: 44px;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
  }
  .thumb .duration {
    position: absolute; right: 6px; bottom: 6px;
    background: rgba(0,0,0,0.7); color: #fff;
    font-size: 11px; padding: 2px 6px; border-radius: 4px;
    pointer-events: none;
  }
  .thumb .placeholder { color: var(--text-3); font-size: 12px; }
  .card .info { padding: 10px 12px 12px; }
  .card .title {
    font-size: 13px; line-height: 1.4;
    color: var(--text);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
    min-height: 2.8em;
  }
  .card .sub {
    margin-top: 6px;
    font-size: 11px; color: var(--text-3);
    display: flex; gap: 8px;
  }

  .player-overlay {
    position: fixed; inset: 0;
    background: #000;
    z-index: 100;
    display: none;
    flex-direction: column;
  }
  .player-overlay.open { display: flex; }
  .player-top {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 16px 20px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
    z-index: 10;
    display: flex; align-items: center; gap: 12px;
    color: #fff;
  }
  .player-top .close-btn {
    background: rgba(255,255,255,0.15); border: 0;
    color: #fff; width: 36px; height: 36px; border-radius: 50%;
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .player-top .close-btn:hover { background: rgba(255,255,255,0.25); }
  .player-top .player-title { font-size: 14px; font-weight: 500; flex: 1; }
  .player-top .player-pos { font-size: 12px; color: rgba(255,255,255,0.7); }

  .player-stage {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .player-stage video {
    max-width: 100%; max-height: 100%;
    background: #000;
  }
  .nav-btn {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 44px; height: 80px;
    background: rgba(255,255,255,0.08);
    border: 0; color: #fff; cursor: pointer;
    font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.2); }
  .nav-btn.prev { left: 0; border-radius: 0 8px 8px 0; }
  .nav-btn.next { right: 0; border-radius: 8px 0 0 8px; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  .player-bottom {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 14px 20px;
    background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
    color: #fff;
    font-size: 12px;
    display: flex; gap: 12px; align-items: center;
  }
  .player-bottom .series-tag {
    background: rgba(255,255,255,0.15);
    padding: 3px 9px; border-radius: 4px;
  }
  .hint { color: rgba(255,255,255,0.6); }

  .empty { text-align: center; padding: 60px 20px; color: var(--text-3); }
</style>
</head>
<body>
<header>
  <h1>我的视频号</h1>
  <span class="meta" id="meta"></span>
  <input type="text" class="search" id="search" placeholder="搜索标题…" />
</header>

<main id="main"><div class="empty">加载中…</div></main>

<div class="player-overlay" id="player">
  <div class="player-top">
    <button class="close-btn" id="closeBtn" title="关闭 (Esc)">×</button>
    <div class="player-title" id="playerTitle"></div>
    <div class="player-pos" id="playerPos"></div>
  </div>
  <div class="player-stage">
    <button class="nav-btn prev" id="prevBtn" title="上一个 (←/↑)">‹</button>
    <video id="playerVideo" controls autoplay playsinline></video>
    <button class="nav-btn next" id="nextBtn" title="下一个 (→/↓)">›</button>
  </div>
  <div class="player-bottom">
    <span class="series-tag" id="playerSeries"></span>
    <span class="hint">← / → 切换 · Esc 关闭 · 鼠标滚轮也可切换</span>
  </div>
</div>

<script>
// =========================================================================
// 视频清单 — 在这里增删视频。
// 想换标题，改 title；想换分组，改 series；想换文件路径，改 src。
// =========================================================================
const DATA = {
  series_order: ["东吴石塔", "东甲塔", "瓷器遗址", "秀屿港", "贤良港宋古码头", "单集"],
  videos: [
    { src: "东吴石塔短视频/东吴石塔01.mp4", title: "东吴石塔01", series: "东吴石塔" },
    { src: "东吴石塔短视频/东吴石塔02.mp4", title: "东吴石塔02", series: "东吴石塔" },
    { src: "东吴石塔短视频/东吴石塔03.mp4", title: "东吴石塔03", series: "东吴石塔" },
    { src: "东吴石塔短视频/东吴石塔04.mp4", title: "东吴石塔04", series: "东吴石塔" },
    { src: "东甲塔视频/东甲塔01.mp4", title: "东甲塔01", series: "东甲塔" },
    { src: "东甲塔视频/东甲塔02.mp4", title: "东甲塔02", series: "东甲塔" },
    { src: "东甲塔视频/东甲塔03.mp4", title: "东甲塔03", series: "东甲塔" },
    { src: "东甲塔视频/东甲塔04.mp4", title: "东甲塔04", series: "东甲塔" },
    { src: "瓷器遗址短视频/南日岛沉船遗址.mp4", title: "南日岛沉船遗址", series: "瓷器遗址" },
    { src: "瓷器遗址短视频/瓷器遗址-溪口窑.mp4", title: "瓷器遗址-溪口窑", series: "瓷器遗址" },
    { src: "秀屿港短视频/秀屿港短视频01.mp4", title: "秀屿港01", series: "秀屿港" },
    { src: "秀屿港短视频/秀屿港短视频02.mp4", title: "秀屿港02", series: "秀屿港" },
    { src: "秀屿港短视频/秀屿港短视频03.mp4", title: "秀屿港03", series: "秀屿港" },
    { src: "秀屿港短视频/秀屿港短视频04.mp4", title: "秀屿港04", series: "秀屿港" },
    { src: "秀屿港短视频/秀屿港短视频05.mp4", title: "秀屿港05", series: "秀屿港" },
    { src: "贤良港宋古码头短视频/贤良港宋古码头01.mp4", title: "贤良港宋古码头01", series: "贤良港宋古码头" },
    { src: "贤良港宋古码头短视频/贤良港宋古码头02.mp4", title: "贤良港宋古码头02", series: "贤良港宋古码头" },
    { src: "贤良港宋古码头短视频/贤良港宋古码头03.mp4", title: "贤良港宋古码头03", series: "贤良港宋古码头" },
    { src: "贤良港宋古码头短视频/贤良港宋古码头04.mp4", title: "贤良港宋古码头04", series: "贤良港宋古码头" },
    { src: "太平港码头.mp4", title: "太平港码头", series: "单集" },
    { src: "倭寇为什么频繁侵犯莆田地理好沿海多港湾易停靠有钱农业手工业发达好打海防弱历史 故事 戚继光将军 热门 奋斗 - 抖音.mp4", title: "倭寇为什么频繁侵犯莆田", series: "单集" },
    { src: "影响莆田历史的四大事件衣冠南渡木兰陂抗倭迁界和截界事件你知道吗莆仙话版本方言 地理 挺有意思的 双十一 故事 - 抖音.mp4", title: "影响莆田历史的四大事件", series: "单集" },
    { src: "福建大莆田一直没有过年过的是岁莆田 倭寇 历史 - 抖音.mp4", title: "福建大莆田一直没有过年，过的是岁", series: "单集" },
    { src: "福建莆田东庄镇各村地名历史由来第一集超级详细版本每天跟我涨知识 一般人不告诉他 地理 家乡 - 抖音.mp4", title: "福建莆田东庄镇各村地名历史由来（一）", series: "单集" },
    { src: "莆田 这些地名 与抗日 有关 - 抖音.mp4", title: "莆田这些地名，与抗日有关", series: "单集" },
    { src: "莆田文化答疑解惑为什么戚继光对莆田贡献这么大但是感觉影响力没那么大莆田人是把戚继光当英雄当爱国将领来纪念而不是神宗族文化 地方习.mp4", title: "莆田文化答疑：为什么戚继光的影响力没那么大", series: "单集" },
    { src: "随性索真 莆田到底多牛一张名单震碎三观古代朝堂半壁江山都是莆阳人 太炸裂了莆田古代朝堂天团曝光宰辅尚书翰林扎堆半壁江山都是莆阳人.mp4", title: "莆田到底多牛：古代朝堂半壁江山都是莆阳人", series: "单集" },
    { src: "d8d3db642263759310d692439cdea2f1.mp4", title: "未命名视频", series: "单集" },
  ]
};

// 给每个视频加一个 id（用 src 当 key）
DATA.videos.forEach((v, i) => v.id = `v${i}`);

let videos = DATA.videos;
let seriesOrder = DATA.series_order;
let filtered = videos.slice();
let currentIdx = -1;

const main = document.getElementById('main');
const meta = document.getElementById('meta');
const search = document.getElementById('search');
const player = document.getElementById('player');
const playerVideo = document.getElementById('playerVideo');
const playerTitle = document.getElementById('playerTitle');
const playerSeries = document.getElementById('playerSeries');
const playerPos = document.getElementById('playerPos');

meta.textContent = `${videos.length} 个视频 · ${seriesOrder.length} 个系列`;
render();

function render() {
  if (filtered.length === 0) {
    main.innerHTML = '<div class="empty">没有匹配的视频</div>';
    return;
  }
  const html = seriesOrder.map(s => {
    const items = filtered.filter(v => v.series === s);
    if (items.length === 0) return '';
    const cards = items.map(cardHTML).join('');
    return `<section class="series"><h2>${esc(s)} <span class="count">${items.length} 个</span></h2><div class="grid">${cards}</div></section>`;
  }).join('');
  main.innerHTML = html;
  main.querySelectorAll('.card').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      const idx = videos.findIndex(v => v.id === id);
      if (idx >= 0) openPlayer(idx);
    });
    generateThumb(el);
  });
}

function cardHTML(v) {
  return `
    <div class="card" data-id="${esc(v.id)}" data-src="${esc(v.src)}">
      <div class="thumb">
        <canvas style="display:none"></canvas>
        <div class="placeholder">加载中…</div>
        <div class="play-icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="11" fill="rgba(0,0,0,0.45)"/><path d="M9 7l9 5-9 5V7z" fill="white"/></svg></div>
        <div class="duration" data-dur></div>
      </div>
      <div class="info">
        <div class="title">${esc(v.title)}</div>
        <div class="sub"><span>${esc(v.series)}</span></div>
      </div>
    </div>`;
}

function generateThumb(cardEl) {
  const src = cardEl.dataset.src;
  const canvas = cardEl.querySelector('canvas');
  const placeholder = cardEl.querySelector('.placeholder');
  const durEl = cardEl.querySelector('[data-dur]');
  const v = document.createElement('video');
  v.muted = true;
  v.playsInline = true;
  v.preload = 'auto';
  v.src = encodeURI(src);

  v.addEventListener('loadedmetadata', () => {
    if (durEl && isFinite(v.duration)) durEl.textContent = formatDur(v.duration);
    try { v.currentTime = Math.min(1, v.duration / 2); } catch {}
  });
  v.addEventListener('seeked', () => {
    try {
      const w = v.videoWidth, h = v.videoHeight;
      if (!w) return;
      const targetW = 480;
      canvas.width = targetW;
      canvas.height = Math.round(h * (targetW / w));
      canvas.getContext('2d').drawImage(v, 0, 0, canvas.width, canvas.height);
      canvas.style.display = 'block';
      placeholder.style.display = 'none';
    } catch (e) {
      placeholder.textContent = '无封面';
    } finally {
      v.src = '';
    }
  });
  v.addEventListener('error', () => { placeholder.textContent = '无法加载'; });
}

function formatDur(s) {
  s = Math.round(s);
  return `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;
}

function openPlayer(idx) {
  currentIdx = idx;
  const v = videos[idx];
  playerVideo.src = encodeURI(v.src);
  playerTitle.textContent = v.title;
  playerSeries.textContent = v.series;
  playerPos.textContent = `${idx + 1} / ${videos.length}`;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === videos.length - 1;
  player.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePlayer() {
  player.classList.remove('open');
  playerVideo.pause();
  playerVideo.removeAttribute('src');
  playerVideo.load();
  document.body.style.overflow = '';
  currentIdx = -1;
}

function next() { if (currentIdx < videos.length - 1) openPlayer(currentIdx + 1); }
function prev() { if (currentIdx > 0) openPlayer(currentIdx - 1); }

document.getElementById('closeBtn').addEventListener('click', closePlayer);
document.getElementById('nextBtn').addEventListener('click', next);
document.getElementById('prevBtn').addEventListener('click', prev);

document.addEventListener('keydown', (e) => {
  if (!player.classList.contains('open')) return;
  if (e.key === 'Escape') closePlayer();
  else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') next();
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prev();
});

let wheelLock = false;
player.addEventListener('wheel', (e) => {
  if (wheelLock || Math.abs(e.deltaY) < 30) return;
  wheelLock = true;
  setTimeout(() => wheelLock = false, 600);
  if (e.deltaY > 0) next(); else prev();
}, { passive: true });

playerVideo.addEventListener('ended', next);

search.addEventListener('input', () => {
  const q = search.value.trim().toLowerCase();
  filtered = q ? videos.filter(v => v.title.toLowerCase().includes(q) || v.series.toLowerCase().includes(q)) : videos.slice();
  render();
});

function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>
</body>
</html>
